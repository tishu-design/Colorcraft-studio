
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorCraft Studio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>🎨 ColorCraft Studio</h2>

<input type="text" id="textInput" value="Be Bold">

<select id="productSelect">
<option value="tshirt">T-Shirt</option>
<option value="phone">Phone Cover</option>
<option value="keychain">Keychain</option>
</select>

<input type="color" id="colorPicker">
<input type="range" id="fontSize" min="20" max="80" value="40">

<div class="preview">
<img id="productImage" src="https://i.imgur.com/9Xn4K6I.png">
<div id="designText">Be Bold</div>
</div>

<script src="script.js"></script>
</body>
</html>
