
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorCraft Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#1e1e2f,#111);
color:white;
text-align:center;
}

header{
padding:20px;
font-size:24px;
font-weight:800;
letter-spacing:1px;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:16px;
}

.preview{
margin-top:20px;
position:relative;
}

.product-box{
width:100%;
height:350px;
background:#222;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

#designText{
position:absolute;
font-weight:800;
font-size:40px;
text-align:center;
}

.button{
margin-top:20px;
padding:15px;
background:#ff4d6d;
border:none;
border-radius:12px;
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
width:100%;
}

.button:active{
transform:scale(0.98);
}
</style>
</head>

<body>

<header>🎨 ColorCraft Studio</header>

<div class="container">

<input type="text" id="textInput" value="Be Bold">

<select id="productSelect">
<option value="tshirt">T-Shirt</option>
<option value="phone">Phone Cover</option>
<option value="keychain">Keychain</option>
<option value="sticker">Sticker</option>
</select>

<input type="color" id="colorPicker" value="#ffffff">

<input type="range" id="fontSize" min="20" max="80" value="40">

<div class="preview">
<div class="product-box" id="productBox">
<div id="designText">Be Bold</div>
</div>
</div>

<button class="button" onclick="downloadDesign()">Download Design</button>

</div>

<script>
const textInput=document.getElementById("textInput");
const designText=document.getElementById("designText");
const colorPicker=document.getElementById("colorPicker");
const fontSize=document.getElementById("fontSize");
const productSelect=document.getElementById("productSelect");
const productBox=document.getElementById("productBox");

textInput.oninput=()=>designText.innerText=textInput.value;
colorPicker.oninput=()=>designText.style.color=colorPicker.value;
fontSize.oninput=()=>designText.style.fontSize=fontSize.value+"px";

productSelect.onchange=()=>{
if(productSelect.value==="tshirt"){
productBox.style.background="#2c2c2c";
}
if(productSelect.value==="phone"){
productBox.style.background="#1a1a40";
}
if(productSelect.value==="keychain"){
productBox.style.background="#403d39";
}
if(productSelect.value==="sticker"){
productBox.style.background="#333";
}
};

function downloadDesign(){
alert("Download feature advanced version me add hoga 🔥");
}
</script>

</body>
</html>
